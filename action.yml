name: Hidden Characters
description: Identify files within your GitHub project that contain hidden characters

inputs:
  path: # id of input
    description: The path to recursively check files within
    required: false
    default: '.'

runs:
  using: "composite"
  steps:
    - name: Run hidden character search
      shell: bash
      run: ${{ github.action_path }}/search.sh "${{ inputs.path }}"

branding:
  icon: alert-triangle
  color: orange
